services:
  - type: web
    name: service-marketplace-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements/prod.txt && python manage.py collectstatic --no-input
    preDeployCommand: python manage.py migrate --no-input
    startCommand: gunicorn config.wsgi:application --bind 0.0.0.0:$PORT --workers 4
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.7
      - key: DJANGO_SETTINGS_MODULE
        value: config.settings.prod
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: service-marketplace-api.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: service-marketplace-db
          property: connectionString

databases:
  - name: service-marketplace-db
    plan: free
    databaseName: service_marketplace
    user: service_marketplace
